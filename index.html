<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для Саши 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: 'Comic Sans MS', cursive;
  color: white;
  text-align: center;
}

/* ORNAMEN */
.heart, .star {
  position: fixed;
  font-size: 20px;
  animation: float linear infinite;
}

@keyframes float {
  0% {transform: translateY(100vh);}
  100% {transform: translateY(-10vh);}
}

/* CONTAINER */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* GIF */
img {
  width: 250px;
  margin-bottom: 20px;
}

/* BUTTON */
button {
  padding: 15px 25px;
  border-radius: 20px;
  border: none;
  background: pink;
  font-size: 18px;
  cursor: pointer;
}

/* TEXT */
#text {
  font-size: 22px;
  max-width: 600px;
  margin: auto;
}

/* COUNTDOWN */
#countdown {
  font-size: 50px;
}
</style>
</head>

<body>

<div class="container">

  <!-- GIF KAMU -->
  <img src="birthday.gif">

  <div id="countdown">3</div>
  <h1>🎂 Это для тебя, Саша 💖</h1>
  <button onclick="start()">Нажми 😳</button>
  <p id="text"></p>
</div>

<!-- MUSIK -->
<audio id="music">
  <source src="musik.mp3" type="audio/mpeg">
</audio>

<script>

/* ORNAMEN */
setInterval(()=>{
  let el=document.createElement("div");
  el.className=Math.random()>0.5?"heart":"star";
  el.innerHTML=Math.random()>0.5?"💖":"✨";
  el.style.left=Math.random()*100+"vw";
  el.style.fontSize=(Math.random()*20+15)+"px";
  el.style.animationDuration=(Math.random()*5+3)+"s";
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),7000);
},200);

/* COUNTDOWN */
let c=3;
let cd=document.getElementById("countdown");

let int=setInterval(()=>{
  c--;
  cd.innerHTML=c;
  if(c==0){
    clearInterval(int);
    cd.innerHTML="🎉";
  }
},1000);

/* MESSAGE */
const msg=[
"С днём рождения, Саша 🎂💖",
"",
"Сегодня особенный день...",
"",
"Я желаю тебе счастья и здоровья ✨",
"",
"Пусть твоя жизнь будет наполнена радостью 💫",
"",
"Hubby… ты иногда вредный 😭",
"Но я всё равно тебя люблю 💕",
"",
"СКОРЕЕ ПРИЕЗЖАЙ КО МНЕ 😭💖",
"Я ЖДУ ТЕБЯ!!!",
"",
"Я люблю тебя, hubby 💖"
];

let i=0,j=0;

function start(){
  document.querySelector("button").style.display="none";
  document.getElementById("music").play();
  type();
}

function type(){
  if(i<msg.length){
    if(j<msg[i].length){
      document.getElementById("text").innerHTML+=msg[i][j];
      j++;
      setTimeout(type,50);
    }else{
      document.getElementById("text").innerHTML+="<br><br>";
      j=0;i++;
      setTimeout(type,500);
    }
  }
}
</script>

</body>
</html>
