<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для Саши 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Comic Sans MS', cursive;
  background: black;
  color: white;
  text-align: center;
}

/* hearts */
.heart {
  position: fixed;
  color: pink;
  font-size: 20px;
  animation: fall linear infinite;
}

@keyframes fall {
  0% {transform: translateY(-10vh);}
  100% {transform: translateY(110vh);}
}

/* container */
.container {
  position: absolute;
  top: 60%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* button */
button {
  padding: 15px 25px;
  font-size: 18px;
  border-radius: 20px;
  border: none;
  background: pink;
  cursor: pointer;
}

/* text */
#text {
  font-size: 22px;
  max-width: 600px;
  margin: auto;
}

/* countdown */
#countdown {
  font-size: 50px;
}

/* girl */
.girl {
  width: 220px;
  position: absolute;
  left: -250px;
  bottom: 50px;
  animation: walk 4s forwards;
}

/* jalan masuk */
@keyframes walk {
  to {
    left: 50%;
    transform: translateX(-50%);
  }
}

/* kasih kue */
.give {
  animation: give 1s infinite alternate;
}

@keyframes give {
  from { transform: translateX(-50%) scale(1); }
  to { transform: translateX(-50%) scale(1.1); }
}
</style>
</head>

<body>

<!-- CEWEK LUCU (BENERAN 😭💖) -->
<img id="girl" class="girl" 
src="https://media.giphy.com/media/26BRuo6sLetdllPAQ/giphy.gif">

<div class="container">
  <div id="countdown">3</div>
  <h1>🎂 Это для тебя, Саша 💖</h1>
  <button onclick="start()">Нажми 😳</button>
  <p id="text"></p>
</div>

<!-- 🎵 MUSIK -->
<audio id="music">
  <source src="musik.mp3" type="audio/mpeg">
</audio>

<script>
/* hearts */
setInterval(() => {
  const h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "💖";
  h.style.left = Math.random()*100+"vw";
  h.style.animationDuration = (Math.random()*3+2)+"s";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),5000);
},300);

/* countdown */
let c = 3;
let cd = document.getElementById("countdown");

let interval = setInterval(()=>{
  c--;
  cd.innerHTML = c;
  if(c==0){
    clearInterval(interval);
    cd.innerHTML="🎉";
  }
},1000);

/* message */
const msg = [
"С днём рождения, Саша 🎂💖",
"",
"Сегодня особенный день...",
"",
"Я желаю тебе счастья и здоровья ✨",
"",
"Пусть твоя жизнь будет наполнена хорошими моментами 💫",
"",
"Hubby… ты иногда вредный 😭",
"Но я всё равно тебя люблю 💕",
"",
"СКОРЕЕ ПРИЕЗЖАЙ КО МНЕ 😭💖",
"Я ЖДУ ТЕБЯ!!!",
"",
"Я люблю тебя, hubby 💖"
];

let i=0,j=0;

function start(){
  document.querySelector("button").style.display="none";

  let music = document.getElementById("music");
  music.play().catch(()=>{});

  setTimeout(()=>{
    document.getElementById("girl").classList.add("give");
  },4000);

  type();
}

function type(){
  if(i<msg.length){
    if(j<msg[i].length){
      document.getElementById("text").innerHTML+=msg[i][j];
      j++;
      setTimeout(type,50);
    }else{
      document.getElementById("text").innerHTML+="<br><br>";
      j=0;i++;
      setTimeout(type,500);
    }
  }
}
</script>

</body>
</html>

</body>
</html>
