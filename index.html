<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для моего Саши 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Comic Sans MS', cursive;
  background: black;
  color: white;
  text-align: center;
}

/* HEART */
.heart {
  position: fixed;
  color: pink;
  font-size: 20px;
  animation: fall linear infinite;
}

@keyframes fall {
  0% {transform: translateY(-10vh);}
  100% {transform: translateY(110vh);}
}

/* CONTAINER */
.container {
  position: absolute;
  top: 55%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* BUTTON */
button {
  padding: 15px 25px;
  font-size: 18px;
  border-radius: 20px;
  border: none;
  background: pink;
  cursor: pointer;
}

/* TEXT */
#text {
  font-size: 22px;
  max-width: 600px;
  margin: auto;
}

/* COUNTDOWN */
#countdown {
  font-size: 50px;
  margin-bottom: 20px;
}

/* GIRL ANIMATION */
.girl {
  width: 180px;
  position: absolute;
  left: -200px;
  bottom: 50px;
  animation: walkIn 4s forwards;
}

/* jalan masuk */
@keyframes walkIn {
  0% { left: -200px; }
  100% { left: 50%; transform: translateX(-50%); }
}

/* kasih kue */
.giveCake {
  animation: give 1s infinite alternate;
}

@keyframes give {
  from { transform: translateX(-50%) scale(1); }
  to { transform: translateX(-50%) scale(1.1); }
}
</style>
</head>

<body>

<!-- CEWEK -->
<img id="girl" class="girl" src="https://media.giphy.com/media/ASd0Ukj0y3qMM/giphy.gif">

<div class="container">
  <div id="countdown">3</div>
  <h1>🎂 Это для тебя, Саша... 💖</h1>
  <button onclick="start()">Нажми сюда 😳</button>
  <p id="text"></p>
</div>

<!-- 🎵 MUSIK DARI FILE KAMU -->
<audio id="music" loop>
  <source src="selamat-ulang-tahun-anak-anak.mp3" type="audio/mpeg">
</audio>

<script>
/* HEART */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = Math.random() * 3 + 2 + "s";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 5000);
}
setInterval(createHeart, 300);

/* COUNTDOWN */
let count = 3;
const countdownEl = document.getElementById("countdown");

const countdown = setInterval(() => {
  count--;
  countdownEl.innerHTML = count;

  if (count === 0) {
    clearInterval(countdown);
    countdownEl.innerHTML = "🎉";
  }
}, 1000);

/* MESSAGE */
const message = [
"С днём рождения, Саша 🎂💖",
"",
"Сегодня особенный день...",
"",
"Я желаю тебе здоровья, счастья,",
"и чтобы всё в твоей жизни было легко ✨",
"",
"Пусть твоя карьера становится только лучше 😤💖",
"",
"Hubby… ты иногда вредный 😭",
"Но я всё равно тебя люблю 💕",
"",
"Теперь смотри внимательно 👀",
"",
"СКОРЕЕ ПРИЕЗЖАЙ КО МНЕ 😭💖",
"Я ЖДУ ТЕБЯ!!!",
"",
"Я люблю тебя, hubby 💖"
];

let i = 0;
let j = 0;

function start() {
  document.querySelector("button").style.display = "none";
  document.getElementById("music").play();

  // animasi kasih kue setelah jalan
  setTimeout(() => {
    document.getElementById("girl").classList.add("giveCake");
  }, 4000);

  typeWriter();
}

/* TYPING */
function typeWriter() {
  if (i < message.length) {
    if (j < message[i].length) {
      document.getElementById("text").innerHTML += message[i].charAt(j);
      j++;
      setTimeout(typeWriter, 50);
    } else {
      document.getElementById("text").innerHTML += "<br><br>";
      j = 0;
      i++;
      setTimeout(typeWriter, 500);
    }
  }
}
</script>

</body>
</html>
